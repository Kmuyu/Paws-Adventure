<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Paws Adventure</title>
<style>
body{margin:0;font-family:Arial;text-align:center;background:linear-gradient(135deg,#89f7fe,#66a6ff);display:flex;flex-direction:column;justify-content:center;align-items:center;height:100vh;}
canvas{background:#e8ffe8;border:2px solid #333;margin-top:10px;}
button{padding:10px 20px;margin:5px;cursor:pointer;}

#instructions{opacity:0;transition:opacity 1s ease;}

#mobileControls button{
  font-size:20px;
  padding:10px;
  margin:3px;
}
</style>
</head>
<body>

<div id="menu">
<h1>🐶 Paws Adventure 🍖</h1>
<button onclick="startGame('solo')">Solo</button>
<button id="multiBtn" onclick="startGame('multi')">Multiplayer</button>
</div>

<div id="ui" style="display:none">
<p id="level"></p>
<p id="timer"></p>
<button onclick="goHome()">Home</button>
<button onclick="resetLevel()">Reset Level</button>
<button onclick="restartGame()">Restart Game</button>
</div>

<div id="endScreen" style="display:none">
<h2>🏁 Game Complete!</h2>
<p id="finalStats"></p>
<button onclick="goHome()">Back to Home</button>
</div>

<h2 id="countdown"></h2>
<canvas id="game" width="600" height="400" style="display:none"></canvas>

<p id="instructions" style="display:none;font-size:14px;margin-top:8px;color:#333;">
Use Arrow Keys or WASD to move your dog to the treat. Avoid obstacles!
</p>

<div id="mobileControls" style="display:none;">
  <div><button onclick="move('up')">⬆️</button></div>
  <div>
    <button onclick="move('left')">⬅️</button>
    <button onclick="move('down')">⬇️</button>
    <button onclick="move('right')">➡️</button>
  </div>
</div>

<script>
const isMobile = /Mobi|Android/i.test(navigator.userAgent);
if(isMobile){ document.getElementById("multiBtn").style.display="none"; }

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
const gridSize=40;
const cols=canvas.width/gridSize;
const rows=canvas.height/gridSize;

let mode,level,time,started=false,gameOver=false;
let timerInterval;
let dog1,dog2,treat;
let movingWalls=[],killTiles=[],freezeTiles=[];
let freezeEnd=0;
let reached1=false,reached2=false;

const dogImg1=new Image(); dogImg1.src="https://cdn-icons-png.flaticon.com/512/616/616408.png";
const dogImg2=new Image(); dogImg2.src="https://cdn-icons-png.flaticon.com/512/616/616430.png";
const treatImg=new Image(); treatImg.src="https://cdn-icons-png.flaticon.com/512/1046/1046784.png";
const fenceImg=new Image(); fenceImg.src="https://cdn-icons-png.flaticon.com/512/427/427735.png";
const skullImg=new Image(); skullImg.src="https://cdn-icons-png.flaticon.com/512/833/833472.png";

function randomPos(){ return {x:Math.floor(Math.random()*cols),y:Math.floor(Math.random()*rows)}; }
function validPosition(pos,list){ return !list.some(o=>o.x===pos.x&&o.y===pos.y); }

function startGame(m){
mode=m;level=1;gameOver=false;
document.getElementById("menu").style.display="none";
document.getElementById("ui").style.display="block";
canvas.style.display="block";
if(isMobile){ document.getElementById("mobileControls").style.display="block"; }
startCountdown();
}

function startCountdown(){
let count=3;started=false;
document.getElementById("countdown").innerText=count;
let i=setInterval(()=>{
count--;
if(count>0){document.getElementById("countdown").innerText=count;}
else{
clearInterval(i);
document.getElementById("countdown").innerText="GO!";
setTimeout(()=>document.getElementById("countdown").innerText="",500);
started=true;
startTimer();
loadLevel();
drawGame();
}
},1000);
}

function startTimer(){
time=0;clearInterval(timerInterval);
timerInterval=setInterval(()=>{
 time++;
 document.getElementById("timer").innerText="Time: "+formatTime(time);
},1000);
}

function formatTime(t){ let m=Math.floor(t/60); let s=t%60; return `${m}:${s.toString().padStart(2,'0')}`; }

function goHome(){location.reload();}
function restartGame(){level=1;loadLevel();drawGame();}
function resetLevel(){loadLevel();drawGame();}

function loadLevel(){
 movingWalls=[];killTiles=[];freezeTiles=[];
 let totalObstacles=Math.max(3,Math.floor(2+level*1.5));

 for(let i=0;i<totalObstacles;i++){
  let dir=Math.random()<0.5?"h":"v";
  movingWalls.push({
    x:Math.floor(Math.random()*cols),
    y:Math.floor(Math.random()*rows),
    dx:dir==="h"?(Math.random()<0.5?1:-1):0,
    dy:dir==="v"?(Math.random()<0.5?1:-1):0
  });
 }

 do{ treat=randomPos(); } while(!validPosition(treat,movingWalls));
 dog1=randomPos(); dog2=randomPos();

 for(let i=0;i<Math.floor(level/3);i++){ let p; do{p=randomPos();}while(!validPosition(p,[...movingWalls,treat])); freezeTiles.push(p);} 
 for(let i=0;i<Math.floor(level/4);i++){ let p; do{p=randomPos();}while(!validPosition(p,[...movingWalls,treat])); killTiles.push(p);} 

 reached1=false;reached2=false;
 document.getElementById("level").innerText="Level: "+level;

 const instr=document.getElementById("instructions");
 if(level===1){ instr.style.display="block"; setTimeout(()=>{instr.style.opacity=1;},50);} 
 else { instr.style.opacity=0; setTimeout(()=>{instr.style.display="none";},1000);} 
}

function drawGame(){
 ctx.clearRect(0,0,canvas.width,canvas.height);
 ctx.drawImage(treatImg,treat.x*gridSize,treat.y*gridSize,gridSize,gridSize);
 movingWalls.forEach(w=>ctx.drawImage(fenceImg,w.x*gridSize,w.y*gridSize,gridSize,gridSize));
 freezeTiles.forEach(t=>{ctx.font="30px Arial";ctx.fillText("🥶",t.x*gridSize+5,t.y*gridSize+30);});
 killTiles.forEach(t=>ctx.drawImage(skullImg,t.x*gridSize,t.y*gridSize,gridSize,gridSize));
 ctx.drawImage(dogImg1,dog1.x*gridSize,dog1.y*gridSize,gridSize,gridSize);
 if(mode==="multi") ctx.drawImage(dogImg2,dog2.x*gridSize,dog2.y*gridSize,gridSize,gridSize);
}

function moveObstacles(){
 movingWalls.forEach(w=>{
  w.x+=w.dx; w.y+=w.dy;
  if(w.x<=0||w.x>=cols-1) w.dx*=-1;
  if(w.y<=0||w.y>=rows-1) w.dy*=-1;
 });
}

function check(player){
 let dog=player===1?dog1:dog2;
 for(let w of movingWalls){ if(dog.x===w.x&&dog.y===w.y){loadLevel();drawGame();return;} }
 for(let t of killTiles){ if(dog.x===t.x&&dog.y===t.y){loadLevel();drawGame();return;} }
 freezeTiles.forEach(t=>{ if(dog.x===t.x&&dog.y===t.y) freezeEnd=Date.now()+3000; });

 if(dog.x===treat.x&&dog.y===treat.y){
  if(player===1) reached1=true;
  if(player===2) reached2=true;
  if(mode==="solo"||(reached1&&reached2)){
    level++;
    if(level>15){
      clearInterval(timerInterval);
      gameOver=true;
      canvas.style.display="none";
      document.getElementById("ui").style.display="none";
      document.getElementById("endScreen").style.display="block";
      document.getElementById("finalStats").innerText=`Time: ${formatTime(time)}`;
      return;
    }
    loadLevel();
  }
 }
}

function move(direction){
 if(!started||gameOver) return;
 moveObstacles();
 if(Date.now()<freezeEnd) return;
 if(direction==="up"&&dog1.y>0) dog1.y--;
 if(direction==="down"&&dog1.y<rows-1) dog1.y++;
 if(direction==="left"&&dog1.x>0) dog1.x--;
 if(direction==="right"&&dog1.x<cols-1) dog1.x++;
 check(1);
 drawGame();
}

document.addEventListener("keydown",e=>{
 if(!started||gameOver) return;
 let frozen=Date.now()<freezeEnd;
 let speed=frozen?0:1;
 if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight","w","a","s","d"].includes(e.key)){ moveObstacles(); }
 for(let i=0;i<speed;i++){
  if(e.key==="ArrowUp"&&dog1.y>0) dog1.y--;
  if(e.key==="ArrowDown"&&dog1.y<rows-1) dog1.y++;
  if(e.key==="ArrowLeft"&&dog1.x>0) dog1.x--;
  if(e.key==="ArrowRight"&&dog1.x<cols-1) dog1.x++;
  if(mode==="solo"){
    if(e.key==="w"&&dog1.y>0) dog1.y--;
    if(e.key==="s"&&dog1.y<rows-1) dog1.y++;
    if(e.key==="a"&&dog1.x>0) dog1.x--;
    if(e.key==="d"&&dog1.x<cols-1) dog1.x++;
  }
  if(mode==="multi"){
    if(e.key==="w"&&dog2.y>0) dog2.y--;
    if(e.key==="s"&&dog2.y<rows-1) dog2.y++;
    if(e.key==="a"&&dog2.x>0) dog2.x--;
    if(e.key==="d"&&dog2.x<cols-1) dog2.x++;
  }
 }
 check(1);
 if(mode==="multi") check(2);
 drawGame();
});
</script>

</body>
</html>
